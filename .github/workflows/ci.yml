name: CI

# Verifies the parts of the project that do NOT need an Apple device:
# Core ML conversion + compression + inspection, and the reasoning abstraction.
# The Swift app (app/) is macOS/Apple-silicon only and is not built here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU torch keeps CI light.
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install coremltools>=8.0 pytest

      - name: Run tests
        run: pytest -q

      - name: End-to-end demo (offline)
        run: python -m pipeline demo
